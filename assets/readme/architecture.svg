<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Silent Orbit public release architecture</title>
  <desc id="desc">Public metadata passes through deterministic export and validation into a static application, while outcomes remain inside the visitor's browser.</desc>
  <rect width="1200" height="420" rx="2" fill="#050505"/>
  <path d="M0 1h1200M0 419h1200" stroke="#4A4A4A"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="52" y="52" fill="#F3F0E8" font-size="14" letter-spacing="2">PUBLIC RELEASE ARCHITECTURE</text>
    <text x="52" y="78" fill="#A4A4A4" font-size="13">one source snapshot / explicit allowlist / static delivery</text>
  </g>
  <g transform="translate(52 126)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g>
      <rect width="220" height="126" fill="none" stroke="#4A4A4A"/>
      <text x="20" y="36" fill="#F3F0E8" font-size="18" font-weight="600">PUBLIC METADATA</text>
      <text x="20" y="66" fill="#A4A4A4" font-size="14">Skills · sources · summaries</text>
      <text x="20" y="90" fill="#A4A4A4" font-size="14">public / creator-showcase</text>
    </g>
    <path d="M220 63h56" stroke="#F3F0E8"/>
    <path d="M268 57l8 6-8 6" fill="none" stroke="#F3F0E8"/>
    <g transform="translate(276)">
      <rect width="250" height="126" fill="none" stroke="#777"/>
      <text x="20" y="36" fill="#F3F0E8" font-size="18" font-weight="600">DETERMINISTIC EXPORT</text>
      <text x="20" y="66" fill="#A4A4A4" font-size="14">allowlist · privacy · provenance</text>
      <text x="20" y="90" fill="#A4A4A4" font-size="14">manifest · SHA-256 · tests</text>
    </g>
    <path d="M526 63h56" stroke="#F3F0E8"/>
    <path d="M574 57l8 6-8 6" fill="none" stroke="#F3F0E8"/>
    <g transform="translate(582)">
      <rect width="220" height="126" fill="none" stroke="#4A4A4A"/>
      <text x="20" y="36" fill="#F3F0E8" font-size="18" font-weight="600">STATIC REACT APP</text>
      <text x="20" y="66" fill="#A4A4A4" font-size="14">bilingual intent search</text>
      <text x="20" y="90" fill="#A4A4A4" font-size="14">System → Library → Skill</text>
    </g>
    <path d="M802 63h56" stroke="#F3F0E8"/>
    <path d="M850 57l8 6-8 6" fill="none" stroke="#F3F0E8"/>
    <g transform="translate(858)">
      <rect width="238" height="126" fill="none" stroke="#F3F0E8"/>
      <text x="20" y="36" fill="#F3F0E8" font-size="18" font-weight="600">VISITOR BROWSER</text>
      <text x="20" y="66" fill="#A4A4A4" font-size="14">interactive catalog</text>
      <text x="20" y="90" fill="#A4A4A4" font-size="14">browser-local outcomes</text>
    </g>
  </g>
  <g transform="translate(52 306)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <path d="M0 0h1096" stroke="#4A4A4A" stroke-dasharray="4 8"/>
    <text x="0" y="34" fill="#F3F0E8" font-size="13">PUBLIC PAYLOAD</text>
    <text x="160" y="34" fill="#A4A4A4" font-size="13">source code · public data · approved assets · release evidence</text>
    <text x="0" y="72" fill="#F3F0E8" font-size="13">LOCAL BOUNDARY</text>
    <text x="160" y="72" fill="#A4A4A4" font-size="13">personal outcomes stay in localStorage and never enter the public export</text>
  </g>
</svg>
