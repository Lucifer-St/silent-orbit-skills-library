<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Silent Orbit Skills Library</title>
  <desc id="desc">A local-first bilingual atlas for searching and navigating AI capabilities by system, library, and skill.</desc>
  <rect width="1200" height="360" rx="2" fill="#050505"/>
  <path d="M0 1h1200M0 359h1200" stroke="#4A4A4A"/>
  <g transform="translate(64 52)" fill="#F3F0E8">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="3">LOCAL-FIRST / BILINGUAL / STATIC</text>
    <text x="0" y="82" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="64" font-weight="700" letter-spacing="-2">SILENT ORBIT</text>
    <text x="0" y="136" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="36" letter-spacing="4">SKILLS LIBRARY</text>
    <text x="0" y="196" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" fill="#A4A4A4">Search by intent. Navigate by system. Keep outcomes local.</text>
    <g transform="translate(0 246)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
      <rect width="156" height="34" fill="none" stroke="#4A4A4A"/>
