      <rect x="168" width="112" height="34" fill="none" stroke="#4A4A4A"/>
      <text x="184" y="22">PRIVACY-FIRST</text>
    </g>
  </g>
  <g transform="translate(955 180)" fill="none">
    <ellipse rx="182" ry="118" stroke="#2F2F2F"/>
    <ellipse rx="132" ry="84" stroke="#4A4A4A" stroke-dasharray="3 8"/>
    <ellipse rx="78" ry="48" stroke="#777"/>
    <circle r="19" fill="#F3F0E8"/>
    <circle cx="-126" cy="-68" r="8" fill="#F3F0E8"/>
    <circle cx="101" cy="-52" r="6" fill="#A4A4A4"/>
    <circle cx="154" cy="64" r="5" fill="#F3F0E8"/>
    <circle cx="-52" cy="76" r="4" fill="#A4A4A4"/>
    <path d="M-155 64l309-128M-126-68L101-52" stroke="#242424"/>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#F3F0E8">
