<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>Skill Library</title>
    <link rel="stylesheet" href="./styles.css?v=phase1e5" />
  </head>
  <body>
    <div id="app" class="app-shell" data-view="map">
      <header class="topbar">
        <div class="identity">
          <strong id="project-title">Skill Library</strong>
          <span>Search and browse your reviewed Skills.</span>
        </div>
        <label class="search-control">
          <span class="sr-only">Search Skills</span>
          <input id="search" type="search" autocomplete="off" placeholder="Search Skills…" />
          <kbd>/</kbd>
        </label>
        <span id="result-count" class="result-count" aria-live="polite"></span>
        <nav class="view-switch" aria-label="View">
          <button type="button" data-view-target="map" aria-pressed="true">Map</button>
          <button type="button" data-view-target="library" aria-pressed="false">Library</button>
        </nav>
        <button id="mobile-filter-button" class="mobile-only filter-trigger" type="button">Filters <span id="mobile-filter-count"></span></button>
      </header>

      <main>
        <section id="map-view" class="map-view" aria-label="Interactive Skill map">
          <div class="map-toolbar">
            <button id="map-overview" type="button">Back to overview</button>
            <span id="map-context"></span>
          </div>
          <div id="map-stage" class="map-stage">
            <svg id="skill-map" viewBox="0 0 1200 760" role="tree" aria-label="Skills organized by category">
              <g id="map-viewport"></g>
            </svg>
            <div class="zoom-controls" aria-label="Map zoom controls">
              <button type="button" data-zoom="in" aria-label="Zoom in">+</button>
              <button type="button" data-zoom="out" aria-label="Zoom out">−</button>
              <button type="button" data-zoom="reset">Reset</button>
            </div>
          </div>
        </section>

        <section id="library-view" class="library-view" aria-label="Skill library">
          <aside id="filter-panel" class="filter-panel">
            <div class="panel-heading">
              <strong>Filters</strong>
              <button id="clear-filters" type="button">Clear all</button>
            </div>
            <fieldset>
              <legend>Categories</legend>
              <div id="category-filters"></div>
            </fieldset>
            <fieldset>
              <legend>Sources</legend>
              <div id="source-filters"></div>
            </fieldset>
          </aside>
          <div class="list-panel">
            <div class="list-heading">
              <strong id="list-count"></strong>
              <span>Name A–Z</span>
            </div>
            <div class="list-columns" aria-hidden="true"><span>Skill</span><span>Category</span><span>Source</span></div>
            <div id="skill-list" class="skill-list" role="listbox" aria-label="Skills"></div>
            <div id="empty-state" class="empty-state" hidden>
              <strong>No matching Skills</strong>
              <span>Clear a filter or try another search.</span>
            </div>
          </div>
        </section>

        <aside id="detail-panel" class="detail-panel" aria-label="Skill detail" aria-hidden="true">
          <div class="detail-actions">
            <button id="detail-back" type="button">Back</button>
            <button id="detail-close" type="button" aria-label="Close detail">Close</button>
          </div>
          <div id="detail-content"></div>
        </aside>
      </main>

      <dialog id="mobile-filters" class="mobile-filters">
        <form method="dialog" class="sheet">
          <div class="sheet-handle" aria-hidden="true"></div>
          <div class="panel-heading"><strong>Filters</strong><button id="mobile-clear-filters" type="button">Clear all</button></div>
          <fieldset><legend>Categories</legend><div id="mobile-category-filters"></div></fieldset>
          <fieldset><legend>Sources</legend><div id="mobile-source-filters"></div></fieldset>
          <button class="apply-button" value="close">Apply filters</button>
        </form>
      </dialog>
    </div>
    <script type="module" src="./app.js?v=phase1e5"></script>
  </body>
</html>
